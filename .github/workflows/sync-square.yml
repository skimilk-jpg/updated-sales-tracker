  name: Sync Square Sales Data

  on:
    schedule:
      - cron: '0 11 * * *'   # Daily at 6 AM Toronto time (UTC-5)
    workflow_dispatch:         # Allow manual trigger from GitHub UI

  jobs:
    sync:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Fetch Square sales data
          env:
            SQUARE_TOKEN: ${{ secrets.SQUARE_TOKEN }}
          run: node fetch-sales.js

        - name: Commit and push sales-data.json
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sales-data.json
            git diff --staged --quiet || git commit -m "chore: update Square sales data [skip ci]"
            git pull --rebase
            git push
