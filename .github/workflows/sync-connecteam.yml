name: Sync Connecteam Schedule Data

on:
  schedule:
    - cron: '30 11 * * *'   # Daily at 6:30 AM Toronto time (UTC-5), 30 min after Square sync
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Connecteam schedule data
        env:
          CONNECTEAM_API_KEY: ${{ secrets.CONNECTEAM_API_KEY }}
        run: node fetch-schedule.js

      - name: Commit and push schedule-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule-data.json
          git diff --staged --quiet || git commit -m "chore: update Connecteam schedule data [skip ci]"
          git pull --rebase
          git push

